     screenshot the viewport -> public/ogp.png. Mirrors the site's editorial
     light theme (see src/styles/global.css): logotype hero with the mint
     highlighter treatment used on chapter headings. -->
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

            href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg: #e9edf1;
                --ink: #1d3744;
                --ink-2: #3c5560;
                --muted: #6a7d83;
                --mint: #7be4d5;
                --mint-ink: #1f9d8a;
                --line-2: rgba(29, 55, 68, 0.26);
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                width: 1200px;
                height: 630px;
                overflow: hidden;
            }
            body {
                background: var(--bg);
                font-family: 'LINE Seed JP', system-ui, sans-serif;
                color: var(--ink);
                -webkit-font-smoothing: antialiased;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                /* optical centering: the light byline makes the logo read high */
                padding-top: 48px;
            }
            .mark {
                background-image: linear-gradient(transparent 52%, var(--mint) 0);
                border-radius: 6px;
                padding: 0 30px 12px;
            }
            .mark svg {
                display: block;
                width: 860px;
                height: auto;
            }
            .byline {
                margin-top: 52px;
                font-size: 27px;
                font-weight: 400;
                color: var(--ink-2);
                letter-spacing: -0.01em;
            }
            .byline b {
                font-weight: 700;
                color: var(--ink);
            }
        </style>
    </head>
