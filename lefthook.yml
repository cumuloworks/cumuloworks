# https://lefthook.dev
pre-commit:
  parallel: true
  jobs:
    - name: format
      glob: "*.{js,mjs,cjs,jsx,ts,mts,cts,tsx,json,jsonc,css,md,mdx,html}"
      run: npx oxfmt {staged_files}
      stage_fixed: true
    - name: lint
      glob: "*.{js,mjs,cjs,jsx,ts,mts,cts,tsx}"
      run: npx oxlint {staged_files}
